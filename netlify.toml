[build]
  publish = "dist"
  command = "npm install && npx expo export --platform web && cp public/_redirects dist/ && cp public/webpushr-sw.js dist/ && cp public/robots.txt dist/ && cp web/manifest.json dist/ && cp web/red.png dist/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
